<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        let nombre = "mica";
        let edad = 18;
        let estudiante = true;



        const pi = 3.1416;
        const IVA = 21;
        const nombre_Curso = "Desarrollo web";


        console.log(nombre, edad, estudiante, pi, IVA, nombre_Curso);
        //no deja cambiar por que dice que es una constante y no se puede declarar
        // si se descomenta aparece una leyenda no puede asignar una constante

        console.log("mica:" + typeof nombre);
        console.log("18:" + typeof edad);
        console.log("true" + typeof estudiante);
        console.log("21" + typeof IVA);
        console.log("Desarrollo web" + typeof nombre_Curso);
        console.log("3.1416" + typeof pi);

        let contador = "0";
        console.log("contador inicial:" + contador);
        contador++;
        console.log("contador:" + contador);
        contador++;
        console.log("contador:" + contador);
        contador++;
        console.log("contador:" + contador);
        contador++;
        console.log("contador:" + contador);
        contador++;
        console.log("contador final:" + contador);

        const maximo = "10";
        console.log("maximo:" + maximo);
        maximo = 20;
        //no anda por que la variable es constante
        var antigua = "valor 1";
        console.log("antigua" + antigua);
        var antigua = "valor 2";
        console.log("antigua redeclarada:" + antigua);
    </script>
</body>

</html>
